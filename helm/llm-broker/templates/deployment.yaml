apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-broker
  namespace: {{ .Values.namespace }}
  labels:
    app: llm-broker
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: llm-broker
  template:
    metadata:
      labels:
        app: llm-broker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: llm-broker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi